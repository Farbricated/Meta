name: digital-yodha
version: "1.0.0"
description: >
  Digital Yodha is a multi-domain OpenEnv environment featuring four specialized AI agents:
  Email Triage, Code Review, Data Cleaning, and Content Moderation.
  Each agent simulates a real-world task with 3 difficulty levels (easy/medium/hard).
author: Digital Yodha Team
tags:
  - openenv
  - email-triage
  - code-review
  - data-cleaning
  - content-moderation
  - multi-agent

tasks:
  - id: email_triage_easy
    name: Email Classification
    difficulty: easy
    description: Classify a single email as spam, important, or newsletter
    agent: email_triage

  - id: email_triage_medium
    name: Email Prioritization
    difficulty: medium
    description: Prioritize 10 emails by urgency and category
    agent: email_triage

  - id: email_triage_hard
    name: Email Reply Drafting
    difficulty: hard
    description: Draft a professional reply to a complex customer complaint
    agent: email_triage

  - id: code_review_easy
    name: Syntax Error Detection
    difficulty: easy
    description: Detect syntax errors in a Python function
    agent: code_review

  - id: code_review_medium
    name: Logic Bug Detection
    difficulty: medium
    description: Find logical bugs and suggest fixes in Python code
    agent: code_review

  - id: code_review_hard
    name: Security Vulnerability Detection
    difficulty: hard
    description: Spot security vulnerabilities like SQL injection or XSS
    agent: code_review

  - id: data_cleaning_easy
    name: Missing Value Detection
    difficulty: easy
    description: Find missing values and duplicates in a dataset
    agent: data_cleaning

  - id: data_cleaning_medium
    name: Data Type Normalization
    difficulty: medium
    description: Fix incorrect data types and normalize columns
    agent: data_cleaning

  - id: data_cleaning_hard
    name: Outlier Detection and Imputation
    difficulty: hard
    description: Detect outliers, impute values, and produce a clean dataset
    agent: data_cleaning

  - id: content_moderation_easy
    name: Explicit Content Detection
    difficulty: easy
    description: Detect explicit hate speech or offensive content
    agent: content_moderation

  - id: content_moderation_medium
    name: Subtle Toxicity Detection
    difficulty: medium
    description: Detect subtle toxicity and sarcasm-based insults
    agent: content_moderation

  - id: content_moderation_hard
    name: Context-Aware Moderation
    difficulty: hard
    description: Context-aware moderation where the same sentence can be safe or unsafe
    agent: content_moderation

endpoints:
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  grader: /grader
  baseline: /baseline
